<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
      }
 
    
      header {
        background: black;
        color: white;
        padding: 15px;
        position: fixed;
        top: 0;
        width: 100%;
      }

      
      main {
        margin-top: 70px; 
      }

      
      section {
        height: 400px;
        padding: 20px;
      }

      
      .section1 {
        background: lightblue;
        position: relative;
      }

      
      .inner-box {
        position: absolute;
        top: 50px;
        left: 50px;
        background: red;
        color: white;
        padding: 10px;
      }

      
      .section2 {
        background: lightgreen;
        position: sticky;
        top: 0;
      }

      
      .section3 {
        background: lightcoral;
      }

      
      footer {
        background: black;
        color: white;
        text-align: center;
        padding: 15px;
      }
    </style>
  </head>

  <body>
    <header>Header</header>

    <main>
      <section class="section1">
        Relative
        <div class="inner-box">Absolute Box</div>
      </section>

      <section class="section2">Sticky</section>

      <section class="section3">Normal</section>
    </main>

    <footer>Footer </footer>
  </body>
</html>
